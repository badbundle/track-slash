{{define "legal-links"}}
<nav aria-label="Legal" class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-xs text-slate-500 dark:text-slate-400">
  <a href="/terms" class="hover:text-slate-900 dark:hover:text-slate-100">Terms</a>
  <a href="/privacy" class="hover:text-slate-900 dark:hover:text-slate-100">Privacy</a>
  <a href="/security" class="hover:text-slate-900 dark:hover:text-slate-100">Security</a>
</nav>
{{end}}

{{define "legal"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · trackslash</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-950 antialiased dark:bg-slate-950 dark:text-slate-100">
  <header class="border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-4 sm:px-6">
      <a href="/" class="text-sm font-semibold">trackslash</a>
      <a href="/login" class="text-sm text-slate-600 hover:text-slate-950 dark:text-slate-300 dark:hover:text-white">Sign in</a>
    </div>
  </header>
  <main class="mx-auto max-w-3xl px-4 py-8 sm:px-6 sm:py-12">
    <article class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900 sm:p-8">
      <div class="mb-6 text-xs text-slate-500 dark:text-slate-400">Version {{.Version}}</div>
      <div class="markdown-body">{{.HTML}}</div>
    </article>
    <div class="mt-6">{{template "legal-links"}}</div>
  </main>
</body>
</html>
{{end}}
