{{define "tab-bar"}}
<nav class="mt-4 overflow-x-auto border-b border-slate-200 dark:border-slate-800" aria-label="{{.Label}}">
  <div class="-mb-px flex items-center gap-6">
    {{range .Items}}
    <a href="{{.Href}}" {{if .HXGet}}hx-get="{{.HXGet}}"{{end}} {{if .HXTarget}}hx-target="{{.HXTarget}}"{{end}} {{if .HXPushURL}}hx-push-url="{{.HXPushURL}}"{{end}} {{if .Active}}aria-current="page"{{end}} class="inline-flex items-center gap-2 border-b-4 px-1 py-3 text-sm font-medium {{if .Active}}border-indigo-600 text-indigo-700 dark:border-indigo-400 dark:text-indigo-200{{else}}border-transparent text-slate-600 hover:border-slate-300 hover:text-slate-900 dark:text-slate-300 dark:hover:border-slate-600 dark:hover:text-slate-100{{end}}">
      {{if .Icon}}<i data-lucide="{{.Icon}}" class="h-4 w-4" aria-hidden="true"></i>{{end}}
      {{.Label}}
    </a>
    {{end}}
  </div>
</nav>
{{end}}

{{define "issue-key"}}
<span class="inline-flex w-fit justify-self-start items-center rounded-md border border-slate-300 bg-white px-1.5 py-0.5 font-mono text-[11px] font-semibold uppercase leading-4 text-slate-600 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-300">{{.}}</span>
{{end}}

{{define "status-badge"}}
<span class="inline-flex items-center rounded-md border px-2.5 py-1 text-xs font-semibold {{statusClass .}}">{{statusLabel .}}</span>
{{end}}
