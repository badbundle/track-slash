{{define "project-panel-changelog"}}
  <section data-project-changelog data-project-id="{{.Project.ID}}" data-refresh-url="{{projectPanel .Project "changelog"}}" class="py-6">
    <div class="mb-3 flex items-center justify-between gap-3">
      <div class="flex min-w-0 flex-wrap items-center gap-2">
        <h2 class="text-sm font-semibold uppercase text-slate-500 dark:text-slate-400">Changelog</h2>
        {{template "count-badge" (len .ChangelogPage.Entries)}}
      </div>
    </div>
    {{if .ChangelogPage.Entries}}
    <div id="project-changelog-list" class="overflow-hidden rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
      {{template "project-changelog-page" .ChangelogPage}}
    </div>
    {{else}}
    <div class="rounded-lg border border-dashed border-slate-300 bg-white px-4 py-6 text-sm text-slate-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-400">No changes yet.</div>
    {{end}}
  </section>
{{end}}
