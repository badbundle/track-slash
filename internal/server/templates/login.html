{{define "login"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>track-slash</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950 antialiased dark:bg-slate-950 dark:text-slate-100">
  <main class="flex min-h-screen items-center justify-center px-4">
    <form method="post" action="/login" class="w-full max-w-sm space-y-4 rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
      <input type="hidden" name="next" value="{{.Next}}">
      <div>
        <h1 class="text-lg font-semibold tracking-normal">track-slash</h1>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Sign in with your username and password.</p>
      </div>
      {{if .Error}}
      <div class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-900 dark:bg-red-950 dark:text-red-200">{{.Error}}</div>
      {{end}}
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="username">Username</label>
      <input id="username" name="username" type="text" autofocus autocomplete="username" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" required>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" required>
      <button type="submit" class="w-full rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Sign in</button>
      <a href="/signup{{if .Next}}?next={{urlquery .Next}}{{end}}" class="block rounded-md px-3 py-2 text-center text-sm font-medium text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Create account</a>
    </form>
  </main>
</body>
</html>
{{end}}

{{define "signup"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>track-slash</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

      <input id="password" name="password" type="password" autocomplete="new-password" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" required>

      <a href="/login{{if .Next}}?next={{urlquery .Next}}{{end}}" class="block rounded-md px-3 py-2 text-center text-sm font-medium text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Sign in</a>
    </form>
  </main>

</html>
