{{define "shell"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{.CSRFToken}}">
  <title>track-slash</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/preload.js"></script>
  <meta name="htmx-config" content='{"includeIndicatorStyles":false,"allowEval":false,"allowScriptTags":false}'>
  <script src="/static/htmx.min.js"></script>
  <script defer src="/static/lucide.min.js"></script>
</head>
<body class="flex flex-col overflow-hidden bg-slate-50 text-slate-950 antialiased dark:bg-slate-950 dark:text-slate-100">
  <input id="sidebar-toggle" type="checkbox" class="hidden">
  <header data-mobile-app-bar class="flex h-14 shrink-0 items-center gap-3 border-b border-slate-200 bg-white px-4 dark:border-slate-800 dark:bg-slate-900 md:hidden">
    <button type="button" data-mobile-sidebar-toggle aria-label="Open navigation" aria-controls="app-sidebar" aria-expanded="false" class="grid h-9 w-9 shrink-0 place-items-center rounded-md text-slate-600 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:text-slate-300 dark:hover:bg-slate-800">
      <i data-lucide="menu" class="h-4 w-4" aria-hidden="true"></i>
    </button>
    <div class="min-w-0 truncate text-sm font-semibold">track-slash</div>
  </header>
  <button type="button" data-mobile-sidebar-backdrop hidden aria-hidden="true" tabindex="-1" aria-label="Close navigation" class="fixed inset-0 z-30 bg-slate-950/40 md:hidden"></button>
  <div class="app-shell flex min-h-0 flex-1">
    {{template "shell-sidebar" .}}

    {{template "shell-main" .}}
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
{{end}}
