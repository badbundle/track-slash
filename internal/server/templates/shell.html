{{define "shell"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>track-slash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    try {
      if (window.localStorage.getItem("track-slash.sidebar.collapsed") === "true") {
        document.documentElement.setAttribute("data-sidebar-collapsed", "");
      }
    } catch (_) {}
  </script>
  <style>
    html[data-sidebar-collapsed] .app-shell > aside,
    #sidebar-toggle:checked ~ .app-shell > aside { width: 4.25rem; }
    html[data-sidebar-collapsed] .app-shell .wide-only,
    #sidebar-toggle:checked ~ .app-shell .wide-only { opacity: 0; pointer-events: none; }
    html[data-sidebar-collapsed] .app-shell .sidebar-head,
    #sidebar-toggle:checked ~ .app-shell .sidebar-head { justify-content: center; gap: 0; padding-left: 0.5rem; padding-right: 0.5rem; }
    html[data-sidebar-collapsed] .app-shell [data-nav-link],
    #sidebar-toggle:checked ~ .app-shell [data-nav-link] { justify-content: center; gap: 0; }
    html[data-sidebar-collapsed] .app-shell [data-sidebar-action],
    #sidebar-toggle:checked ~ .app-shell [data-sidebar-action] { justify-content: center; gap: 0; }
    html[data-sidebar-collapsed] .app-shell [data-nav-link] .wide-only,
    html[data-sidebar-collapsed] .app-shell .sidebar-head .wide-only,
    html[data-sidebar-collapsed] .app-shell [data-sidebar-action] .wide-only,
    html[data-sidebar-collapsed] .app-shell [data-member-label],
    #sidebar-toggle:checked ~ .app-shell [data-nav-link] .wide-only,
    #sidebar-toggle:checked ~ .app-shell .sidebar-head .wide-only,
    #sidebar-toggle:checked ~ .app-shell [data-sidebar-action] .wide-only,
    #sidebar-toggle:checked ~ .app-shell [data-member-label] { width: 0; overflow: hidden; }
    html[data-sidebar-collapsed] .app-shell [data-member-summary],
    #sidebar-toggle:checked ~ .app-shell [data-member-summary] { justify-content: center; gap: 0; padding-left: 0.25rem; padding-right: 0.25rem; }
    html[data-sidebar-collapsed] .app-shell [data-member-menu],
    #sidebar-toggle:checked ~ .app-shell [data-member-menu] { bottom: 0.5rem; left: calc(100% + 0.5rem); right: auto; width: 12rem; }
    .wide-only { transition: opacity 120ms ease; }
    .scrollbar-none { scrollbar-width: none; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="h-screen overflow-hidden bg-slate-50 text-slate-950 antialiased dark:bg-slate-950 dark:text-slate-100">
  <input id="sidebar-toggle" type="checkbox" class="hidden">
  <div class="app-shell flex h-screen">
    {{template "shell-sidebar" .}}

    {{template "shell-main" .}}
  </div>
  {{template "shell-scripts" .}}
</body>
</html>
{{end}}
