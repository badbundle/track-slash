{{define "settings-panel"}}
<section class="mx-auto max-w-5xl px-6 py-6">
  <header class="border-b border-slate-200 pb-5 dark:border-slate-800">
    <div class="min-w-0">
      <h1 class="truncate text-2xl font-semibold tracking-normal">Settings</h1>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Update account profile and password.</p>
    </div>
  </header>

  <section class="grid gap-6 py-6 lg:grid-cols-2">
    <form method="post" action="/settings/profile" class="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
      <h2 class="text-sm font-semibold uppercase text-slate-500 dark:text-slate-400">Profile</h2>
      {{if .ProfileError}}<div class="mt-3 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-900 dark:bg-red-950 dark:text-red-200">{{.ProfileError}}</div>{{end}}
      {{if .ProfileSaved}}<div class="mt-3 rounded-md border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-800 dark:border-emerald-900 dark:bg-emerald-950 dark:text-emerald-200">Profile saved.</div>{{end}}
      <label class="mt-4 block text-sm font-medium text-slate-700 dark:text-slate-300" for="name">Display name</label>
      <input id="name" name="name" type="text" value="{{.User.Name}}" autocomplete="name" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" required>
      <label class="mt-4 block text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
      <input id="email" name="email" type="email" value="{{.User.Email}}" autocomplete="email" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100">
      <button type="submit" class="mt-4 rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Save profile</button>
    </form>

    <form method="post" action="/settings/password" class="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
      <h2 class="text-sm font-semibold uppercase text-slate-500 dark:text-slate-400">Password</h2>
      {{if .PasswordError}}<div class="mt-3 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-900 dark:bg-red-950 dark:text-red-200">{{.PasswordError}}</div>{{end}}
      {{if .PasswordChanged}}<div class="mt-3 rounded-md border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-800 dark:border-emerald-900 dark:bg-emerald-950 dark:text-emerald-200">Password changed.</div>{{end}}
      <label class="mt-4 block text-sm font-medium text-slate-700 dark:text-slate-300" for="current_password">Current password</label>
      <input id="current_password" name="current_password" type="password" autocomplete="current-password" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" required>
      <label class="mt-4 block text-sm font-medium text-slate-700 dark:text-slate-300" for="new_password">New password</label>
      <input id="new_password" name="new_password" type="password" autocomplete="new-password" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" required>
      <button type="submit" class="mt-4 rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Change password</button>
    </form>
  </section>
</section>
{{end}}
