{{define "project-panel-all"}}
  <section class="py-6">
    {{template "issue-list-controls" .AllControls}}
    <div class="mb-3 flex items-center justify-between gap-3">
      <div class="flex min-w-0 flex-wrap items-center gap-2">
        <h2 class="text-sm font-semibold uppercase text-slate-500 dark:text-slate-400">All issues</h2>
        {{template "count-badge" (len .AllIssues)}}
      </div>
    </div>
    {{template "all-issue-list" .AllIssuePage}}
  </section>
{{end}}
