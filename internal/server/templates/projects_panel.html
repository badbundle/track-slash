{{define "projects-panel"}}
<section class="mx-auto max-w-6xl px-6 py-6">
  <header class="border-b border-slate-200 pb-5 dark:border-slate-800">
    <div class="flex flex-wrap items-end justify-between gap-3">
      <div class="min-w-0">
        <h1 class="truncate text-2xl font-semibold tracking-normal">Projects</h1>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Projects you can access.</p>
      </div>
      <div class="text-xs text-slate-500 dark:text-slate-400">{{len .Projects}} projects</div>
    </div>
  </header>

  <section class="grid gap-6 py-6 lg:grid-cols-[minmax(0,1fr)_22rem]">
    <div class="min-w-0">
      {{if .Projects}}
      <div class="overflow-hidden rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
        {{range .Projects}}
        <a href="/projects/{{.ID}}" class="grid grid-cols-[4.5rem_1fr_auto] items-center gap-3 border-b border-slate-100 px-4 py-3 text-sm last:border-b-0 hover:bg-slate-50 dark:border-slate-800 dark:hover:bg-slate-800/60">
          <span class="font-mono text-xs font-semibold text-indigo-600 dark:text-indigo-300">{{.Key}}</span>
          <span class="min-w-0">
            <span class="block truncate font-medium text-slate-900 dark:text-slate-100">{{.Name}}</span>
            {{if .Description}}<span class="mt-0.5 block truncate text-xs text-slate-500 dark:text-slate-400">{{.Description}}</span>{{end}}
          </span>
          <i data-lucide="chevron-right" class="h-4 w-4 text-slate-400" aria-hidden="true"></i>
        </a>
        {{end}}
      </div>
      {{else}}
      <div class="rounded-lg border border-dashed border-slate-300 bg-white px-4 py-6 text-sm text-slate-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-400">No accessible projects.</div>
      {{end}}
    </div>

    <form method="post" action="/projects" class="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
      <div class="mb-4 flex items-center justify-between gap-3">
        <h2 class="text-sm font-semibold uppercase text-slate-500 dark:text-slate-400">Create project</h2>
        <i data-lucide="plus" class="h-4 w-4 text-slate-400" aria-hidden="true"></i>
      </div>
      {{if .Error}}<div class="mb-4 rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700 dark:border-rose-900 dark:bg-rose-950/40 dark:text-rose-200">{{.Error}}</div>{{end}}
      <label class="block text-xs font-medium text-slate-500 dark:text-slate-400" for="project-key">Key</label>
      <input id="project-key" name="key" value="{{.Key}}" autocomplete="off" class="mt-1 w-full rounded-md border border-slate-200 bg-white px-3 py-2 font-mono text-sm text-slate-950 outline-none ring-indigo-500 focus:ring-2 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" placeholder="TRACK">

      <label class="mt-4 block text-xs font-medium text-slate-500 dark:text-slate-400" for="project-name">Name</label>
      <input id="project-name" name="name" value="{{.Name}}" class="mt-1 w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-sm text-slate-950 outline-none ring-indigo-500 focus:ring-2 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100" placeholder="Track Slash">

      <label class="mt-4 block text-xs font-medium text-slate-500 dark:text-slate-400" for="project-description">Description</label>
      <textarea id="project-description" name="description" rows="3" class="mt-1 w-full resize-none rounded-md border border-slate-200 bg-white px-3 py-2 text-sm text-slate-950 outline-none ring-indigo-500 focus:ring-2 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100">{{.Description}}</textarea>

      <button type="submit" class="mt-4 inline-flex w-full items-center justify-center gap-2 rounded-md bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-700">
        <i data-lucide="plus" class="h-4 w-4" aria-hidden="true"></i>
        Create project
      </button>
    </form>
  </section>
</section>
{{end}}
