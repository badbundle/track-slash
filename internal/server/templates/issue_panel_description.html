{{define "issue-panel-description"}}
      <section class="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
        {{if .EditDescription}}
        <form method="post" action="{{issueDescription .Issue}}" hx-post="{{issueDescription .Issue}}" hx-target="#main" hx-push-url="false">
          <header class="flex items-center justify-between gap-3">
            <h2 class="text-sm font-semibold uppercase text-slate-500 dark:text-slate-400">Description</h2>
            <div class="flex items-center gap-2">
              <button type="submit" aria-label="Save description" class="grid h-7 w-7 shrink-0 place-items-center rounded-md bg-indigo-600 text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900">
                <i data-lucide="check" class="h-4 w-4" aria-hidden="true"></i>
              </button>
              <button type="button" aria-label="Cancel editing description" hx-get="{{issuePanel .Issue}}" hx-target="#main" hx-push-url="false" class="grid h-7 w-7 shrink-0 place-items-center rounded-md border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-300 dark:hover:bg-slate-800 dark:focus:ring-offset-slate-900">
                <i data-lucide="x" class="h-4 w-4" aria-hidden="true"></i>
              </button>
            </div>
          </header>
          <textarea name="description" rows="7" autofocus data-submit-shortcut="meta-enter" placeholder="Description" class="mt-3 min-h-40 w-full resize-y rounded-md border border-slate-200 bg-white px-3 py-2 text-sm leading-6 text-slate-950 outline-none ring-indigo-500 focus:ring-2 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100">{{.Issue.Description}}</textarea>
        </form>
        {{else}}
        <header class="flex items-center justify-between gap-3">
          <h2 class="text-sm font-semibold uppercase text-slate-500 dark:text-slate-400">Description</h2>
          <button type="button" aria-label="Edit description" hx-get="{{issueDescriptionEdit .Issue}}" hx-target="#main" hx-push-url="false" class="grid h-7 w-7 place-items-center rounded-md border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-300 dark:hover:bg-slate-800 dark:focus:ring-offset-slate-900">
            <i data-lucide="pencil" class="h-4 w-4" aria-hidden="true"></i>
          </button>
        </header>
        {{if .Issue.Description}}
        <div class="mt-3 whitespace-pre-wrap text-sm leading-6 text-slate-800 dark:text-slate-200">{{.Issue.Description}}</div>
        {{else}}
        <div class="mt-3 rounded-lg border border-dashed border-slate-300 px-4 py-6 text-sm text-slate-500 dark:border-slate-800 dark:text-slate-400">No description.</div>
        {{end}}
        {{end}}
      </section>
{{end}}
