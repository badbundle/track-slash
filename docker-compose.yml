services:
  postgres:
    image: postgres:18-alpine
    container_name: track-slash-pg
    environment:
      POSTGRES_USER: track
      POSTGRES_PASSWORD: track
      POSTGRES_DB: track
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U track -d track"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
